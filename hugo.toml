baseURL = 'https://oss.neurosam.ai/'
languageCode = 'ko-KR'
title = 'neurosam.AI Open Source'
theme = 'neurosam-oss'
enableRobotsTXT = true

[params]
  description = 'neurosam.AI가 만들고 공유하는 오픈소스 프로젝트 카탈로그입니다. 개발자 커뮤니티와 함께 더 나은 도구를 만들어갑니다.'
  author = 'Neurosam AI Team'
  keywords = 'neurosam,오픈소스,open source,developer tools,CLI,deployment,DevOps'
  mainSiteURL = 'https://neurosam.ai'

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'dracula'
    lineNos = false

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[permalinks]
  projects = '/projects/:slug/'
