<!DOCTYPE html>
<html lang="ko">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-brand-950 text-gray-200 min-h-screen flex flex-col antialiased selection:bg-brand-500/30">
  {{ partial "header.html" . }}
  <main class="flex-1 pt-24">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <script>
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('nav');
      if (window.scrollY > 10) {
        nav.classList.add('shadow-lg', 'shadow-black/20');
      } else {
        nav.classList.remove('shadow-lg', 'shadow-black/20');
      }
    });

    // Auto-fetch latest versions from GitHub
    document.querySelectorAll('.tow-version[data-repo]').forEach(el => {
      const repo = el.dataset.repo.replace('https://github.com/', '');
      fetch(`https://api.github.com/repos/${repo}/tags?per_page=1`)
        .then(r => r.json())
        .then(tags => { if (tags[0] && tags[0].name) el.textContent = tags[0].name; })
        .catch(() => {});
    });
  </script>
</body>
</html>
