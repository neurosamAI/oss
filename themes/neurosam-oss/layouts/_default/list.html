{{ define "main" }}
<section class="py-16">
  <div class="max-w-5xl mx-auto px-5 sm:px-8">
    <h1 class="text-3xl font-extrabold text-white mb-8">{{ .Title }}</h1>
    <div class="grid gap-4">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="block p-5 rounded-xl border border-white/[0.06] bg-white/[0.02] hover:border-brand-500/30 transition-all">
        <h2 class="text-lg font-bold text-white">{{ .Title }}</h2>
        <p class="text-sm text-gray-400 mt-1">{{ .Description }}</p>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
